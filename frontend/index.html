<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="css/styles.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Roboto:ital,wght@0,100..900;1,100..900&display=swap" rel="stylesheet">
    <script defer src="js/index.js"></script>
    <title>FrontEnd</title>
</head>
<body>
    
    <header>
        <div class="logo">
            <a href="index.html"><img class="logo-img" src="http://localhost:3000/img/logo.png" alt="logo de la pagina"></a>
        </div>

        <div class="container-search">
            <form id="form" class="form-search">
                <input id="search" class="input-search" type="text" autocomplete="off" autocorrect="off" placeholder="buscar">
            </form>
            <ion-icon class="icon-search" name="search-outline"></ion-icon>
        </div>

        <nav>
            <ul class="nav-links">
                <li><a href="">Inicio</a></li>
                <li><a href="productos">Productos</a></li>
                <li class="cart-container">
                    <a href="#" id="cart-btn">
                        <ion-icon class="icon-cart" name="cart"></ion-icon>
                        <span id="cart-badge" class="cart-badge">0</span>
                    </a>

                    <div id="cart-dropdown" class="cart-dropdown hidden">
                        <p class="cart-title">Carrito</p>
                        <ul id="cart-items"></ul>
                    </div>
                </li>
            </ul>
        </nav>
    </header>

    <main class="container">
        <h1 class="title">¡Bienvenidos a GGHardware!</h1>

        <section id="products">
            <h2 class="products__title">Productos</h2>

            <div class="container-btns">
                <button id="order-name" class="btn-order">Ordenar alfabéticamente A - Z</button>
                <button id="order-price" class="btn-order">Ordenar por precio mayor - menor</button>
            </div>

            <div id="list-products" class="cards">
            </div>
        </section>
    </main>

    <footer>
        <p class="text-copy">&copy; Todos los derechos reservados 2025</p>
    </footer>

    <script type="module" src="https://unpkg.com/ionicons@7.1.0/dist/ionicons/ionicons.esm.js"></script>
    <script nomodule src="https://unpkg.com/ionicons@7.1.0/dist/ionicons/ionicons.js"></script>

</body>
</html>
